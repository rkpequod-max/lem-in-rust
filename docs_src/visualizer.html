<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lem-in // YoRHa Visualiser</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v6.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0c0f;--bg-deep:#050608;--panel:rgba(12,15,20,.85);--border:rgba(180,190,200,.07);
  --text:#d4d8dc;--dim:#4a5560;--accent:#b8c0c8;--yoRHa:#a0a8b0;--warm:#c4a050;
  --red:#8b2020;--green:#4a7a3a;--ember:#d06030;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;letter-spacing:.01em}
canvas{display:block;position:fixed;inset:0;cursor:grab}
canvas:active{cursor:grabbing}

/* ── Vignette + scanlines ── */
.vignette{position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.5) 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:3;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 3px);opacity:.4}

/* ── Topbar ── */
.topbar{position:absolute;top:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;background:linear-gradient(180deg,rgba(8,10,14,.95),rgba(8,10,14,.7));border-bottom:1px solid var(--border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:20}
.brand{display:flex;align-items:center;gap:.6rem}
.brand-mark{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--warm);letter-spacing:.15em;text-transform:uppercase}
.brand-mark::before{content:'◆ ';opacity:.5}
.brand h1{font-size:.78rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--yoRHa)}
.brand .sub{font-size:.55rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}

.gen-bar{display:flex;gap:.2rem;align-items:center}
.gen-bar button{background:transparent;border:1px solid var(--border);color:var(--dim);padding:.25rem .5rem;border-radius:0;font-size:.6rem;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .2s;letter-spacing:.05em}
.gen-bar button:hover{color:var(--text);border-color:rgba(180,190,200,.2);background:rgba(180,190,200,.03)}
.gen-bar button.active{color:var(--warm);border-color:var(--warm);background:rgba(196,160,80,.05);box-shadow:inset 0 0 8px rgba(196,160,80,.08)}
.gen-info{font-size:.55rem;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-left:.5rem;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}

.topbar-right{display:flex;gap:.4rem;align-items:center}
.btn-solve{background:transparent;border:1px solid var(--warm);color:var(--warm);padding:.3rem 1rem;border-radius:0;font-size:.65rem;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.btn-solve:hover{background:var(--warm);color:var(--bg)}

/* ── Panels ── */
.panel{position:absolute;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:var(--panel);border:1px solid var(--border);z-index:10;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.panel::before{content:'';position:absolute;top:0;left:0;width:12px;height:1px;background:var(--warm)}
.panel::after{content:'';position:absolute;top:0;left:0;width:1px;height:12px;background:var(--warm)}

/* Left panel */
.left-panel{top:60px;left:14px;width:290px;bottom:60px;display:flex;flex-direction:column;overflow-y:auto}
.left-panel::-webkit-scrollbar{width:3px}
.left-panel::-webkit-scrollbar-thumb{background:var(--warm);border-radius:0}
.lp-section{padding:.8rem .9rem;border-bottom:1px solid var(--border)}
.lp-section:last-child{border:none}
.lp-section h3{font-size:.55rem;text-transform:uppercase;letter-spacing:.15em;color:var(--dim);margin-bottom:.5rem;font-weight:500;font-family:'JetBrains Mono',monospace}
.lp-section h3::before{content:'> ';color:var(--warm);opacity:.5}
.map-input{width:100%;height:140px;background:rgba(0,0,0,.4);border:1px solid var(--border);color:var(--text);padding:.35rem;font-family:'JetBrains Mono',monospace;font-size:.56rem;resize:vertical;line-height:1.5;letter-spacing:0}
.map-input:focus{outline:none;border-color:rgba(196,160,80,.3)}
.output-box{background:rgba(0,0,0,.4);border:1px solid var(--border);padding:.35rem;font-family:'JetBrains Mono',monospace;font-size:.55rem;height:180px;overflow-y:auto;white-space:pre;line-height:1.6;color:var(--dim)}
.output-box .current{color:var(--warm);background:rgba(196,160,80,.05)}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.3rem}
.stat-card{background:rgba(0,0,0,.2);padding:.4rem .5rem;border-left:2px solid var(--dim);transition:border-color .3s}
.stat-card.accent{border-left-color:var(--warm)}
.stat-card.green{border-left-color:var(--green)}
.stat-card.red{border-left-color:var(--red)}
.stat-card.info{border-left-color:var(--yoRHa)}
.stat-val{font-size:.9rem;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text);line-height:1.2}
.stat-card.accent .stat-val{color:var(--warm)} .stat-card.green .stat-val{color:var(--green)} .stat-card.red .stat-val{color:var(--red)} .stat-card.info .stat-val{color:var(--yoRHa)}
.stat-lbl{font-size:.5rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-top:.1rem;font-family:'JetBrains Mono',monospace}

/* Tools */
.tool-row{display:flex;gap:.3rem;align-items:center;margin-bottom:.4rem}
.tool-input{background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--text);padding:.3rem .4rem;border-radius:0;font-size:.62rem;outline:none;font-family:'JetBrains Mono',monospace;flex:1;letter-spacing:.02em}
.tool-input:focus{border-color:rgba(196,160,80,.3)}
.tool-input::placeholder{color:var(--dim);font-size:.58rem}
.tool-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:.3rem .5rem;border-radius:0;font-size:.58rem;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
.tool-btn:hover{color:var(--text);border-color:rgba(180,190,200,.2)}
.tool-btn.active{color:var(--ember);border-color:var(--ember);background:rgba(208,96,48,.05)}

/* Sliders */
.slider-row{margin-bottom:.4rem}
.slider-row label{display:flex;justify-content:space-between;font-size:.58rem;color:var(--dim);margin-bottom:.15rem;font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
.slider-row label span{color:var(--warm)}
input[type=range]{width:100%;accent-color:var(--warm);cursor:pointer;height:2px;background:var(--border)}

/* Right panel */
.right-panel{top:60px;right:14px;width:230px;display:none;flex-direction:column}
#rp-title{font-size:.6rem;font-weight:500;color:var(--yoRHa);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.12em;font-family:'JetBrains Mono',monospace}
#rp-title::before{content:'> ';color:var(--warm);opacity:.5}
.path-list{max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;padding-right:3px;margin-bottom:.5rem}
.path-list::-webkit-scrollbar{width:2px} .path-list::-webkit-scrollbar-thumb{background:var(--warm)}
.path-node{background:rgba(0,0,0,.2);padding:5px 8px;border-radius:0;font-family:'JetBrains Mono',monospace;font-size:.68rem;display:flex;align-items:center;justify-content:center;border:1px solid transparent;transition:all .2s;cursor:pointer;color:var(--text);letter-spacing:.02em}
.path-node:hover{border-color:rgba(196,160,80,.3);background:rgba(196,160,80,.05)}
.path-node.is-target{border-color:var(--warm);background:rgba(196,160,80,.08);color:var(--warm)}
.path-node.is-start{color:var(--green);border-color:rgba(74,122,58,.3)}
.path-node.is-end{color:var(--red);border-color:rgba(139,32,32,.3)}
.path-arrow{text-align:center;color:var(--dim);font-size:10px;margin:-1px 0}

/* Bottom controls */
.controls{bottom:14px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:.3rem;padding:.4rem .6rem}
.controls button{background:transparent;border:1px solid var(--border);color:var(--yoRHa);width:30px;height:30px;border-radius:0;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'JetBrains Mono',monospace}
.controls button:hover{border-color:var(--warm);color:var(--warm)}
.controls button.primary{border-color:var(--warm);color:var(--warm);width:auto;padding:0 .8rem;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase}
.controls button.primary:hover{background:var(--warm);color:var(--bg)}
.controls button.active{background:rgba(196,160,80,.1)}
.speed-wrap{display:flex;align-items:center;gap:.3rem;margin-left:.3rem;padding-left:.3rem;border-left:1px solid var(--border)}
.speed-wrap span{font-size:.5rem;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
.speed-wrap input{width:60px;accent-color:var(--warm)}

/* Turn badge */
.turn-badge{position:absolute;top:60px;left:50%;transform:translateX(-50%);padding:.25rem .7rem;border-radius:0;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:500;z-index:10;background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);display:none;letter-spacing:.08em}
.turn-badge::before{content:'';position:absolute;top:0;left:0;width:8px;height:1px;background:var(--warm)}
.turn-badge .dim{color:var(--dim);font-weight:300}

/* Progress bar */
.progress{position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(180,190,200,.03);z-index:5}
.progress-fill{height:100%;background:var(--warm);transition:width .3s;width:0%;box-shadow:0 0 4px var(--warm)}

/* Tooltip */
#tooltip{position:fixed;background:var(--panel);border:1px solid var(--warm);padding:6px 9px;border-radius:0;pointer-events:none;opacity:0;transition:opacity .15s;z-index:500;font-size:.68rem;transform:translate(-50%,calc(-100% - 8px));box-shadow:0 4px 12px rgba(0,0,0,.5);backdrop-filter:blur(8px);font-family:'JetBrains Mono',monospace;letter-spacing:.02em}
.tt-id{color:var(--warm);font-weight:700;margin-bottom:2px;font-size:.72rem}
.tt-row{color:var(--dim);line-height:1.5} .tt-row span{color:var(--text)}

/* Hints */
.hints{font-size:.5rem;color:var(--dim);display:flex;justify-content:space-between;gap:.2rem;font-family:'JetBrains Mono',monospace;letter-spacing:.03em}
.hints kbd{background:rgba(180,190,200,.04);border:1px solid var(--border);border-radius:0;padding:1px 4px;font-family:monospace;font-size:.5rem}

.loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--warm);font-size:.75rem;z-index:50;font-family:'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase}

/* Decorative corner marks */
.corner-mark{position:fixed;width:20px;height:20px;z-index:4;pointer-events:none;opacity:.3}
.corner-mark.tl{top:52px;left:0;border-top:1px solid var(--warm);border-left:1px solid var(--warm)}
.corner-mark.tr{top:52px;right:0;border-top:1px solid var(--warm);border-right:1px solid var(--warm)}
.corner-mark.bl{bottom:0;left:0;border-bottom:1px solid var(--warm);border-left:1px solid var(--warm)}
.corner-mark.br{bottom:0;right:0;border-bottom:1px solid var(--warm);border-right:1px solid var(--warm)}
</style>
</head>
<body>

<div class="vignette"></div>
<div class="scanlines"></div>
<div class="corner-mark tl"></div><div class="corner-mark tr"></div><div class="corner-mark bl"></div><div class="corner-mark br"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">YoRHa</div>
    <div><h1>Lem-in Visualiser</h1><div class="sub">// Unit 2B // Tactical Display</div></div>
  </div>
  <div class="gen-bar">
    <button onclick="genOfficial('flow-one',this)">--flow-one</button>
    <button onclick="genOfficial('flow-ten',this)">--flow-ten</button>
    <button onclick="genOfficial('flow-thousand',this)">--flow-thousand</button>
    <button onclick="genOfficial('big',this)">--big</button>
    <button onclick="genOfficial('big-superposition',this)">--big-super</button>
    <span class="gen-info" id="genInfo"></span>
  </div>
  <div class="topbar-right">
    <button class="btn-solve" onclick="runSimulation()">▶ Execute</button>
  </div>
</div>

<div class="turn-badge" id="turnBadge">CYCLE <span id="turnNow">0</span><span class="dim"> / </span><span id="turnTotal">0</span></div>

<canvas id="canvas"></canvas>

<div class="panel left-panel">
  <div class="lp-section">
    <h3>Map Data</h3>
    <textarea class="map-input" id="inputMap" spellcheck="false">4
##start
1 0 0
2 1 0
3 0 1
4 1 1
##end
5 2 0
1-2
1-3
2-4
3-4
4-5</textarea>
  </div>
  <div class="lp-section">
    <h3>Status</h3>
    <div class="stats-grid">
      <div class="stat-card accent"><div class="stat-val" id="s-ants">—</div><div class="stat-lbl">Units</div></div>
      <div class="stat-card info"><div class="stat-val" id="s-active">0</div><div class="stat-lbl">Active</div></div>
      <div class="stat-card"><div class="stat-val" id="s-turn">—</div><div class="stat-lbl">Cycle</div></div>
      <div class="stat-card info"><div class="stat-val" id="s-paths">—</div><div class="stat-lbl">Routes</div></div>
      <div class="stat-card green" style="grid-column:span 2"><div class="stat-val" id="s-arrived">0/0</div><div class="stat-lbl">Arrived</div></div>
    </div>
  </div>
  <div class="lp-section">
    <h3>Tactical</h3>
    <div class="tool-row">
      <input type="text" class="tool-input" id="focus-input" placeholder="Track unit ID…">
      <button class="tool-btn" id="btn-heatmap" onclick="toggleHeatmap()">HEATMAP</button>
    </div>
    <div class="slider-row"><label>// TIMELINE <span id="tl-label">0/0</span></label><input type="range" id="timeline" min="0" max="0" value="0" step="1"></div>
    <div class="slider-row"><label>// VELOCITY <span id="spd-val">70</span></label><input type="range" id="speed" min="1" max="100" value="70" oninput="document.getElementById('spd-val').textContent=this.value"></div>
  </div>
  <div class="lp-section">
    <h3>Output Log</h3>
    <div class="output-box" id="output"></div>
    <div class="hints" style="margin-top:.4rem">
      <span><kbd>DRAG</kbd> Pan</span><span><kbd>CLK</kbd> Isolate</span><span><kbd>SPC</kbd> Play</span><span><kbd>H</kbd> Heat</span>
    </div>
  </div>
</div>

<div class="panel right-panel" id="hud-right">
  <div id="rp-title">Route Analysis</div>
  <div id="rp-content"></div>
  <button class="tool-btn" id="btn-cycle-path" style="width:100%;display:none;margin-top:.4rem;border-color:var(--warm);color:var(--warm)">Next Route</button>
</div>

<div class="panel controls">
  <button onclick="resetAll()" title="Reset">↺</button>
  <button onclick="prevStep()" title="Prev">◀</button>
  <button onclick="togglePlay()" id="pauseBtn" title="Play/Pause" class="primary">▶</button>
  <button onclick="nextStep()" title="Next">▶</button>
  <div class="speed-wrap"><span>MS</span><input type="range" id="speedRange" min="50" max="2000" value="600"></div>
</div>

<div class="progress"><div class="progress-fill" id="progressFill"></div></div>
<div id="tooltip">
  <div class="tt-id" id="tt-name">—</div>
  <div class="tt-row">Passages: <span id="tt-visits">0</span></div>
  <div class="tt-row">Links: <span id="tt-degree">0</span></div>
  <div class="tt-row">Type: <span id="tt-type">—</span></div>
</div>
<div class="loading" id="loadingMsg">// LOADING WASM MODULE…</div>

<script type="module">
import init, { parse_and_solve } from './lem_in_rust.js';

const CC = {
  bg:'#0a0c0f', grid:'rgba(180,190,200,0.04)', text:'rgba(212,216,220,',
  link:'rgba(140,150,165,0.18)', roomFill:'#181c22', roomStroke:'rgba(140,150,165,0.45)',
  dimmed:'rgba(255,255,255,0.025)', hlBg:'rgba(12,15,20,0.92)', hlBorder:'#c4a050'
};

let wasmReady = false;
(async () => { try { await init(); wasmReady = true; document.getElementById('loadingMsg').style.display = 'none'; } catch(e) { document.getElementById('loadingMsg').textContent = 'ERROR: ' + e; } })();

function mapFiles(opt) { return Array.from({length:10}, (_,i) => `maps/${opt}_${i+1}.txt`); }

window.genOfficial = async function(opt, btn) {
  if (!wasmReady) { alert('WASM en chargement…'); return; }
  document.querySelectorAll('.gen-bar button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const files = mapFiles(opt);
  const file = files[Math.floor(Math.random() * files.length)];
  document.getElementById('genInfo').textContent = 'Loading…';
  try {
    const r = await fetch(file); if (!r.ok) throw new Error('HTTP ' + r.status);
    const mapText = await r.text();
    document.getElementById('inputMap').value = mapText;
    const ls = mapText.split('\n');
    const a = ls[0], rm = ls.filter(l => l.match(/^\S+ -?\d+ -?\d+$/)).length;
    const lk = ls.filter(l => l.includes('-') && !l.startsWith('#') && !l.match(/^\S+ -?\d+ -?\d+$/)).length;
    const n = file.match(/_(\d+)\./)[1];
    document.getElementById('genInfo').textContent = `${a} units · ${rm} rooms · ${lk} links · #${n}/10`;
  } catch(e) { document.getElementById('genInfo').textContent = 'ERROR: ' + e; }
};

let nodes = [], links = [], moves = [];
let nodeMap = new Map(), startNode = null, endNode = null;
let step = -1, playing = false, totalAnts = 0, arrived = 0;
let roomVisits = new Map(), isHeatmap = false, focusedAntId = null, hoveredNodeId = null, lockedNodeId = null;
let globalAntJourneys = new Map(), uniquePaths = [], currentPathDisplayIndex = 0;
let globalEdgeUsage = new Map(), maxEdgeUsage = 1, currentTrackedAntPath = [];
let isMassive = false;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

let transform = d3.zoomIdentity.translate(W/2, H/2).scale(0.3);
const ants = new Map();
let suppressZoom = false;
const particles = [];

function spawnExplosion(x, y, hue) {
  if (particles.length > 250) return;
  const n = isMassive ? 3 : 8;
  for (let i = 0; i < n; i++) { const a = Math.random()*Math.PI*2, s = Math.random()*3+1; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color:`hsl(${hue},85%,55%)`}); }
}
function antHue(id) { let h=0; for(const c of String(id)) h=(h*31+c.charCodeAt(0))&0x7FFF; return (h/0x7FFF)*360; }

const zoom = d3.zoom().scaleExtent([0.01,15]).on('zoom', e => {
  transform = e.transform;
  if (!suppressZoom) { if (e.sourceEvent && e.sourceEvent.type !== 'wheel' && focusedAntId) { focusedAntId = null; document.getElementById('focus-input').value = ''; renderRightPanel(); } render(); }
});
d3.select(canvas).call(zoom).call(zoom.transform, transform);

function render() {
  ctx.save();
  ctx.fillStyle = CC.bg; ctx.fillRect(0, 0, W, H);
  if (!nodes.length) { ctx.fillStyle = CC.text+'0.3)'; ctx.font = '300 14px Inter'; ctx.textAlign = 'center'; ctx.fillText('// AWAITING MAP DATA', W/2, H/2); ctx.restore(); return; }
  const gs = 60 * transform.k;
  if (gs > 10) { ctx.fillStyle = CC.grid; const ox = transform.x % gs, oy = transform.y % gs; ctx.beginPath(); for (let x = ox-gs; x < W+gs; x += gs) for (let y = oy-gs; y < H+gs; y += gs) ctx.fillRect(x, y, 1, 1); }
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);
  // Rayons adaptatifs : plus petits pour les grandes maps
  const sizeFactor = nodes.length > 1500 ? 0.6 : nodes.length > 500 ? 0.8 : 1;
  const rRoom = Math.max(3, 11*sizeFactor/transform.k), rSpecial = Math.max(6, 18*sizeFactor/transform.k), lw = 1/transform.k;
  const vL=(-transform.x)/transform.k, vR=(W-transform.x)/transform.k, vT=(-transform.y)/transform.k, vB=(H-transform.y)/transform.k, pad=50/transform.k;
  const vis = (x,y) => x>=vL-pad && x<=vR+pad && y>=vT-pad && y<=vB+pad;
  let isoN = new Set(), isoL = new Set(), iso = false;
  if (focusedAntId && currentTrackedAntPath.length > 0) { iso = true; for (let i = 0; i < currentTrackedAntPath.length; i++) { isoN.add(currentTrackedAntPath[i]); if (i > 0) isoL.add([currentTrackedAntPath[i-1],currentTrackedAntPath[i]].sort().join('~')); } }
  else if (lockedNodeId) { iso = true; const pp = uniquePaths.filter(p => p.includes(lockedNodeId)); if (pp.length > 0) { const p = pp[currentPathDisplayIndex]; for (let i = 0; i < p.length; i++) { isoN.add(p[i]); if (i > 0) isoL.add([p[i-1],p[i]].sort().join('~')); } } else { isoN.add(lockedNodeId); links.forEach(l => { const k = [l.source.id,l.target.id].sort().join('~'); if (l.source.id === lockedNodeId || l.target.id === lockedNodeId) { isoL.add(k); isoN.add(l.source.id); isoN.add(l.target.id); } }); } }
  ctx.lineCap = 'round';
  // Pré-calculer les centroïdes pour les liens courbes
  links.forEach(l => {
    if (!vis(l.source.x, l.source.y) && !vis(l.target.x, l.target.y)) return;
    const k = [l.source.id,l.target.id].sort().join('~');

    }
    links = rawLinks.map(l => { const s = nodeMap.get(l[0]), t = nodeMap.get(l[1]); return s && t ? {source:s, target:t} : null; }).filter(l => l);
    links.forEach(l => { l.source.degree = (l.source.degree||0)+1; l.target.degree = (l.target.degree||0)+1; });
    const rl = result.split('\n'); let inM = false;
    for (const line of rl) { if (line.trim() === '') continue; if (line.startsWith('L')) { inM = true; moves.push(line); const d = document.createElement('div'); d.textContent = line; out.appendChild(d); line.split(' ').forEach(tok => { if (!tok.startsWith('L')) return; const d2 = tok.indexOf('-'); const id = tok.substring(1, d2), tn = tok.substring(d2+1); if (!globalAntJourneys.has(id)) globalAntJourneys.set(id, [startNode.id]); globalAntJourneys.get(id).push(tn); }); } }
    processUniquePaths();
    const fr = new Set(); if (moves.length > 0) for (const tok of moves[0].split(' ')) { const m = tok.match(/L\d+-(\S+)/); if (m) fr.add(m[1]); }
    if (startNode) { startNode.x = -500; startNode.y = 0; startNode.fx = -500; startNode.fy = 0; }
    if (endNode) { endNode.x = 500; endNode.y = 0; endNode.fx = 500; endNode.fy = 0; }
    const nR = nodes.filter(n => n !== startNode && n !== endNode).length; let idx = 0;
    nodes.forEach(n => { if (n === startNode || n === endNode) return; const a = (idx/nR)*Math.PI*2; n.x = Math.cos(a)*(200+Math.random()*200); n.y = Math.sin(a)*(150+Math.random()*150); idx++; });
    // Adaptive force parameters based on graph size
    const isLarge = nodes.length > 200;
    const isHuge = nodes.length > 1500;
    const chargeStr = isHuge ? -300 : isLarge ? -200 : -150;
    const linkDist = isHuge ? 80 : isLarge ? 60 : 50;
    const collideR = isHuge ? 12 : isLarge ? 14 : 16;
    const sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d=>d.id).distance(linkDist).strength(0.12))
      .force('charge', d3.forceManyBody().strength(chargeStr))
      .force('center', d3.forceCenter(0,0))
      .force('collide', d3.forceCollide().radius(d => d.type==='start'||d.type==='end' ? 35 : collideR))
      .force('x', d3.forceX(0).strength(0.02))
      .force('y', d3.forceY(0).strength(0.02))
      .stop();
    const ticks = nodes.length > 1500 ? 300 : nodes.length > 500 ? 400 : 500;
    for (let i = 0; i < ticks; i++) sim.tick();
    nodes.forEach(n => { delete n.fx; delete n.fy; });
    document.getElementById('s-ants').textContent = totalAnts;
    document.getElementById('s-turn').textContent = `0/${moves.length}`;
    document.getElementById('s-paths').textContent = fr.size;
    document.getElementById('s-arrived').textContent = `0/${totalAnts}`;
    document.getElementById('turnBadge').style.display = 'block';
    document.getElementById('turnTotal').textContent = moves.length;
    document.getElementById('tl-label').textContent = `0/${moves.length}`;
    document.getElementById('timeline').max = moves.length;
    document.getElementById('timeline').value = 0;
    d3.select(canvas).transition().duration(400).call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(Math.min(0.5, 300/Math.sqrt(nodes.length))));
    render();
    setTimeout(() => { playing = false; togglePlay(); }, 600);
  } catch(e) { out.innerHTML = '<span style="color:var(--red)">ERROR: ' + e + '</span>'; }
};
</script>
