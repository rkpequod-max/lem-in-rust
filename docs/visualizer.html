<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lem-in Visualiseur</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b10;--panel:rgba(14,18,26,.92);--border:rgba(255,255,255,.08);
  --text:#e8eaed;--dim:#6b7280;--accent:#3b82f6;--green:#10b981;
  --red:#ef4444;--amber:#f59e0b;--ant:#fbbf24;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
canvas{display:block;cursor:grab}
canvas:active{cursor:grabbing}

/* Floating panels */
.hud{position:absolute;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:var(--panel);border:1px solid var(--border);border-radius:12px;z-index:10}

/* Top bar */
.topbar{top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;border-radius:0;background:var(--panel);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);position:absolute;z-index:20}
.brand{display:flex;align-items:center;gap:.6rem}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.brand h1{font-size:.9rem;font-weight:600;letter-spacing:-.01em}
.brand .sub{font-size:.65rem;color:var(--dim)}
.gen-bar{display:flex;gap:.3rem}
.gen-bar button{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--dim);padding:.3rem .65rem;border-radius:6px;font-size:.68rem;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s}
.gen-bar button:hover{color:var(--text);border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
.gen-bar button.active{color:var(--bg);background:var(--accent);border-color:var(--accent);font-weight:600}
.topbar-right{display:flex;align-items:center;gap:.5rem}
.btn-solve{background:var(--accent);color:#fff;border:none;padding:.4rem 1rem;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-solve:hover{background:#2563eb}
.gen-info{font-size:.62rem;color:var(--dim);font-family:'JetBrains Mono',monospace;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Left panel — map + output */
.left-panel{top:72px;left:12px;width:300px;max-height:calc(100vh - 84px);display:flex;flex-direction:column;gap:8px}
.panel-section{padding:.7rem}
.panel-section h3{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:.4rem;font-weight:600}
.map-input{width:100%;height:100px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.4rem;font-family:'JetBrains Mono',monospace;font-size:.62rem;resize:none;line-height:1.4}
.map-input:focus{outline:none;border-color:var(--accent)}
.output-box{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:.4rem;font-family:'JetBrains Mono',monospace;font-size:.6rem;height:120px;overflow-y:auto;white-space:pre;line-height:1.5;color:var(--dim)}
.output-box .current{color:var(--accent);background:rgba(59,130,246,.08);border-radius:2px}

/* Right panel — stats */
.right-panel{top:72px;right:12px;width:160px;padding:.7rem}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:.3rem 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border:none}
.stat-lbl{font-size:.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:1rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text)}
.stat-val.accent{color:var(--accent)}
.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--amber)}

/* Bottom controls */
.controls{bottom:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:.4rem;padding:.5rem .8rem}
.controls button{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.controls button:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.controls button.primary{background:var(--accent);border-color:var(--accent);width:auto;padding:0 1rem}
.speed-wrap{display:flex;align-items:center;gap:.4rem;margin-left:.4rem;padding-left:.4rem;border-left:1px solid var(--border)}
.speed-wrap span{font-size:.6rem;color:var(--dim)}
.speed-wrap input{width:80px;accent-color:var(--accent)}

/* Progress bar */
.progress{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.04);z-index:5}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s;width:0%}

/* Turn badge */
.turn-badge{position:absolute;top:72px;left:50%;transform:translateX(-50%);padding:.4rem 1rem;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;z-index:10;background:var(--panel);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border)}
.turn-badge .dim{color:var(--dim);font-weight:400}

.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--accent);font-size:.8rem;z-index:50}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div><h1>Lem-in</h1><div class="sub">Visualiseur · WASM</div></div>
  </div>
  <div class="gen-bar">
    <button onclick="genOfficial('flow-one',this)">--flow-one</button>
    <button onclick="genOfficial('flow-ten',this)">--flow-ten</button>
    <button onclick="genOfficial('flow-thousand',this)">--flow-thousand</button>
    <button onclick="genOfficial('big',this)">--big</button>
    <button onclick="genOfficial('big-superposition',this)">--big-superposition</button>
    <span class="gen-info" id="genInfo"></span>
  </div>
  <div class="topbar-right">
    <button class="btn-solve" onclick="runSimulation()">▶ Résoudre</button>
  </div>
</div>

<div class="turn-badge" id="turnBadge" style="display:none">
  Tour <span id="turnNow">0</span><span class="dim"> / </span><span id="turnTotal">0</span>
</div>

<canvas id="canvas"></canvas>

<div class="hud left-panel">
  <div class="panel-section">
    <h3>Carte</h3>
    <textarea class="map-input" id="inputMap" spellcheck="false">4
##start
1 0 0
2 1 0
3 0 1
4 1 1
##end
5 2 0
1-2
1-3
2-4
3-4
4-5</textarea>
  </div>
  <div class="panel-section">
    <h3>Sortie</h3>
    <div class="output-box" id="output"></div>
  </div>
</div>

<div class="hud right-panel">
  <div class="stat-row"><span class="stat-lbl">Fourmis</span><span class="stat-val" id="antCount">—</span></div>
  <div class="stat-row"><span class="stat-lbl">Salles</span><span class="stat-val" id="roomCount">—</span></div>
  <div class="stat-row"><span class="stat-lbl">Tours</span><span class="stat-val accent" id="turnCount">—</span></div>
  <div class="stat-row"><span class="stat-lbl">Chemins</span><span class="stat-val amber" id="pathCount">—</span></div>
  <div class="stat-row"><span class="stat-lbl">Arrivées</span><span class="stat-val green" id="arrivedCount">0/0</span></div>
</div>

<div class="hud controls">
  <button onclick="reset()" title="Reset">↺</button>
  <button onclick="stepBack()" title="Tour précédent">◀</button>
  <button onclick="togglePause()" id="pauseBtn" title="Play/Pause">▶</button>
  <button onclick="stepForward()" title="Tour suivant">▶</button>
  <div class="speed-wrap">
    <span>Vitesse</span>
    <input type="range" id="speedRange" min="50" max="2000" value="600">
  </div>
</div>

<div class="progress"><div class="progress-fill" id="progressFill"></div></div>
<div class="loading" id="loadingMsg">Chargement WASM…</div>

<script type="module">
import init,{parse_and_solve} from './lem_in_rust.js';

let wasmReady=false,isPaused=true,animTimer=null;
let moves=[],currentTurn=0,totalTurns=0,totalAnts=0;
let rooms=[],links=[],roomMap={};
let antPositions={}; // antId -> {room, x, y, prevX, prevY, progress}
let canvas,ctx,cw,ch,dpr;
let panX=0,panY=0,zoom=1,isDragging=false,dragSX=0,dragSY=0;

async function loadWasm(){try{await init();wasmReady=true;document.getElementById('loadingMsg').style.display='none'}catch(e){document.getElementById('loadingMsg').textContent='Erreur: '+e}}
loadWasm();

// === Maps pré-générées ===
function mapFiles(opt){return Array.from({length:10},(_,i)=>`maps/${opt}_${i+1}.txt`)}
const MAP_DESC={'flow-one':'1 fourmi','flow-ten':'~10 fourmis','flow-thousand':'~100 fourmis','big':'~300 fourmis','big-superposition':'~350 fourmis'};

window.genOfficial=async function(opt,btn){
  if(!MAP_DESC[opt])return;
  document.querySelectorAll('.gen-bar button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const files=mapFiles(opt);const file=files[Math.floor(Math.random()*files.length)];
  try{
    const r=await fetch(file);if(!r.ok)throw new Error('HTTP '+r.status);
    const t=await r.text();document.getElementById('inputMap').value=t;
    const ls=t.split('\n');const a=ls[0];
    const rm=ls.filter(l=>l.match(/^\S+ -?\d+ -?\d+$/)).length;
    const lk=ls.filter(l=>l.includes('-')&&!l.startsWith('#')&&!l.match(/^\S+ -?\d+ -?\d+$/)).length;
    const n=file.match(/_(\d+)\./)[1];
    document.getElementById('genInfo').textContent=`${a} fourmis · ${rm} salles · ${lk} liens · #${n}/10`;
  }catch(e){document.getElementById('genInfo').textContent='❌ '+e}
};

// === Canvas setup ===
function setupCanvas(){
  canvas=document.getElementById('canvas');ctx=canvas.getContext('2d');
  function resize(){dpr=window.devicePixelRatio||1;cw=window.innerWidth;ch=window.innerHeight;canvas.width=cw*dpr;canvas.height=ch*dpr;canvas.style.width=cw+'px';canvas.style.height=ch+'px';ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
  window.addEventListener('resize',resize);resize();
  canvas.addEventListener('mousedown',e=>{if(e.button!==0)return;isDragging=true;dragSX=e.clientX-panX;dragSY=e.clientY-panY});
  window.addEventListener('mousemove',e=>{if(!isDragging)return;panX=e.clientX-dragSX;panY=e.clientY-dragSY;draw()});
  window.addEventListener('mouseup',()=>isDragging=false);
  canvas.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY>0?.9:1.1;zoom=Math.max(.1,Math.min(8,zoom*f));draw()},{passive:false});
}
setupCanvas();

// === Layout : cercles concentriques ===
function computeLayout(){
  if(rooms.length===0)return;
  const cx=cw/2,cy=ch/2;
  const start=rooms.find(r=>r.isStart);
  const end=rooms.find(r=>r.isEnd);
  // Placer start au centre, end en haut
  if(start){start.sx=cx;start.sy=cy}
  if(end){end.sx=cx;end.sy=cy-Math.min(cw,ch)*0.35}

  const others=rooms.filter(r=>!r.isStart&&!r.isEnd);
  if(others.length<=200){
    // Layout basé sur coordonnées originales (normalisées)
    const xs=others.map(r=>r.x),ys=others.map(r=>r.y);
    const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
    const rx=maxX-minX||1,ry=maxY-minY||1;
    const pad=80,s=Math.min((cw-2*pad)/rx,(ch-2*pad)/ry);
    const ox=(cw-rx*s)/2,oy=(ch-ry*s)/2;
    others.forEach(r=>{r.sx=ox+(r.x-minX)*s;r.sy=oy+(r.y-minY)*s});
  }else{
    // Layout circulaire pour grandes maps
    const maxR=Math.min(cw,ch)*0.42;
    others.forEach((r,i)=>{
      const a=(i/others.length)*Math.PI*2;
      const rad=maxR*(0.3+0.7*Math.sin(i*1.7));
      r.sx=cx+Math.cos(a)*rad;r.sy=cy+Math.sin(a)*rad;
    });
  }
}

// === Draw ===
function draw(){
  ctx.clearRect(0,0,cw,ch);
  if(rooms.length===0)return;

  ctx.save();
  ctx.translate(panX,panY);
  ctx.scale(zoom,zoom);

  const showLabels=rooms.length<=100;
  const radius=Math.max(3,Math.min(16,500/Math.sqrt(rooms.length)));

  // Links
  ctx.strokeStyle='rgba(255,255,255,.06)';
  ctx.lineWidth=Math.max(.5,radius*.15);
  for(const[a,b]of links){
    const r1=roomMap[a],r2=roomMap[b];
    if(r1&&r2&&r1.sx!==undefined){
      ctx.beginPath();ctx.moveTo(r1.sx,r1.sy);ctx.lineTo(r2.sx,r2.sy);ctx.stroke();
    }
  }

  // Rooms
  for(const r of rooms){
    if(r.sx===undefined)continue;
    // Glow for start/end
    if(r.isStart){ctx.shadowColor='#10b981';ctx.shadowBlur=20}
    else if(r.isEnd){ctx.shadowColor='#ef4444';ctx.shadowBlur=20}
    else ctx.shadowBlur=0;

    ctx.beginPath();ctx.arc(r.sx,r.sy,radius,0,Math.PI*2);
    if(r.isStart)ctx.fillStyle='#10b981';
    else if(r.isEnd)ctx.fillStyle='#ef4444';
    else ctx.fillStyle='#1e293b';
    ctx.fill();

    ctx.shadowBlur=0;
    ctx.strokeStyle=r.isStart?'#34d399':r.isEnd?'#f87171':'rgba(59,130,246,.4)';
    ctx.lineWidth=r.isStart||r.isEnd?2:1;
    ctx.stroke();

    if(showLabels){
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.font=`${Math.max(7,radius-3)}px JetBrains Mono,monospace`;
      ctx.textAlign='center';
      ctx.fillText(r.name,r.sx,r.sy+radius+9);
    }
  }

  // Ants — positions interpolées
  for(const[id,pos]of Object.entries(antPositions)){
    const r=roomMap[pos.room];
    if(!r||r.sx===undefined)continue;
    // Interpolation
    let ax=r.sx,ay=r.sy;
    if(pos.prevX!==undefined&&pos.progress<1){
      ax=pos.prevX+(r.sx-pos.prevX)*pos.progress;
      ay=pos.prevY+(r.sy-pos.prevY)*pos.progress;
    }

    // Glow
    ctx.shadowColor='#fbbf24';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(ax,ay,Math.max(2.5,radius*.5),0,Math.PI*2);
    ctx.fillStyle='#fbbf24';ctx.fill();
    ctx.shadowBlur=0;

    if(rooms.length<=80){
      ctx.fillStyle='#1a1500';
      ctx.font=`bold ${Math.max(6,radius*.5)}px JetBrains Mono,monospace`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(id,ax,ay);
    }
    ctx.textBaseline='alphabetic';
  }

  ctx.restore();
}

// === Animation loop ===
function animateLoop(){
  let needsRedraw=false;
  for(const pos of Object.values(antPositions)){
    if(pos.progress<1){pos.progress=Math.min(1,pos.progress+0.08);needsRedraw=true}
  }
  if(needsRedraw)draw();
  requestAnimationFrame(animateLoop);
}
animateLoop();

// === Resolution ===
window.runSimulation=async function(){
  if(!wasmReady){alert('WASM en chargement…');return}
  const input=document.getElementById('inputMap').value;
  const out=document.getElementById('output');out.innerHTML='';
  try{
    const result=parse_and_solve(input);
    const lines=result.split('\n');let inMoves=false;
    moves=[];rooms=[];links=[];roomMap={};
    for(const line of lines){
      if(line.trim()==='')continue;
      if(line.startsWith('L')){inMoves=true;moves.push(line);
        const div=document.createElement('div');div.textContent=line;out.appendChild(div);
      }else if(!inMoves){
        if(line==='##start'||line==='##end')continue;
        const rm=line.match(/^(\S+)\s+(-?\d+)\s+(-?\d+)$/);
        if(rm){const r={name:rm[1],x:parseInt(rm[2]),y:parseInt(rm[3])};rooms.push(r);roomMap[rm[1]]=r}
        else if(line.includes('-')&&!line.startsWith('#')){const p=line.split('-');if(p.length===2)links.push([p[0],p[1]])}
      }
    }
    // Detect start/end
    const il=input.split('\n');let ns=false,ne=false;
    for(const line of il){
      if(line.trim()==='##start'){ns=true;continue}
      if(line.trim()==='##end'){ne=true;continue}
      const m=line.match(/^(\S+)\s+(-?\d+)\s+(-?\d+)$/);
      if(m){const r=roomMap[m[1]];if(r){if(ns){r.isStart=true;ns=false}if(ne){r.isEnd=true;ne=false}}}
    }
    totalAnts=parseInt(il[0])||0;totalTurns=moves.length;currentTurn=0;antPositions={};
    document.getElementById('antCount').textContent=totalAnts;
    document.getElementById('roomCount').textContent=rooms.length;
    document.getElementById('turnCount').textContent=totalTurns;
    document.getElementById('turnBadge').style.display='block';
    document.getElementById('turnTotal').textContent=totalTurns;
    // Count paths
    if(moves.length>0){const s=new Set();for(const t of moves[0].trim().split(/\s+/)){const m=t.match(/L\d+-(\S+)/);if(m)s.add(m[1])}document.getElementById('pathCount').textContent=s.size}
    panX=0;panY=0;zoom=1;computeLayout();updateTurn(0);
    isPaused=false;document.getElementById('pauseBtn').textContent='⏸';startAnim();
  }catch(e){out.innerHTML='<span style="color:#ef4444">Erreur: '+e+'</span>'}
};

function updateTurn(turn){
  currentTurn=turn;
  // Build ant positions with interpolation
  const newPositions={};
  for(let t=0;t<=turn&&t<moves.length;t++){
    for(const tok of moves[t].trim().split(/\s+/)){
      const m=tok.match(/L(\d+)-(\S+)/);
      if(m){
        const antId=m[1],roomName=m[2];
        const r=roomMap[roomName];
        const prev=antPositions[antId];
        if(prev&&prev.room!==roomName&&r){
          // Moving to new room — interpolate from previous
          newPositions[antId]={room:roomName,prevX:prev.prevX!==undefined&&prev.progress>=1?roomMap[prev.room]?.sx:prev.prevX,prevY:prev.prevY!==undefined&&prev.progress>=1?roomMap[prev.room]?.sy:prev.prevY,progress:0};
        }else if(!prev&&r){
          newPositions[antId]={room:roomName,prevX:r.sx,prevY:r.sy,progress:1};
        }else{
          newPositions[antId]={room:roomName,prevX:r?.sx,prevY:r?.sy,progress:1};
        }
      }
    }
  }
  antPositions=newPositions;

  // Stats
  const endRoom=rooms.find(r=>r.isEnd);
  const arrived=endRoom?Object.values(antPositions).filter(p=>p.room===endRoom.name).length:0;
  document.getElementById('turnNow').textContent=turn+1;
  document.getElementById('arrivedCount').textContent=`${arrived}/${totalAnts}`;
  document.getElementById('progressFill').style.width=`${totalTurns>0?((turn+1)/totalTurns)*100:0}%`;

  // Output highlight
  const lines=document.getElementById('output').children;
  Array.from(lines).forEach((l,i)=>{l.className=i===turn?'current':''});
  if(lines[turn])lines[turn].scrollIntoView({block:'nearest'});
  draw();
}

function startAnim(){
  if(animTimer)clearTimeout(animTimer);
  if(isPaused||currentTurn>=totalTurns-1)return;
  updateTurn(currentTurn+1);
  const speed=2100-parseInt(document.getElementById('speedRange').value);
  animTimer=setTimeout(startAnim,speed);
}

window.togglePause=function(){isPaused=!isPaused;document.getElementById('pauseBtn').textContent=isPaused?'▶':'⏸';if(!isPaused)startAnim()};
window.stepForward=function(){if(currentTurn<totalTurns-1){isPaused=true;document.getElementById('pauseBtn').textContent='▶';updateTurn(currentTurn+1)}};
window.stepBack=function(){if(currentTurn>0){isPaused=true;document.getElementById('pauseBtn').textContent='▶';updateTurn(currentTurn-1)}};
window.reset=function(){if(animTimer)clearTimeout(animTimer);isPaused=true;currentTurn=0;antPositions={};moves=[];document.getElementById('pauseBtn').textContent='▶';document.getElementById('output').innerHTML='';document.getElementById('turnBadge').style.display='none';document.getElementById('progressFill').style.width='0%';document.getElementById('arrivedCount').textContent='0/0';document.getElementById('turnCount').textContent='—';document.getElementById('pathCount').textContent='—';document.getElementById('antCount').textContent='—';document.getElementById('roomCount').textContent='—';rooms=[];links=[];roomMap={};draw()};
</script>
</body>
</html>
