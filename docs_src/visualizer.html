<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lem-in — Visualiseur Professionnel</title>
    <style>
        :root {
            --bg: #0a0e14;
            --bg-panel: #11161e;
            --bg-elevated: #1a1f2b;
            --border: #2a3140;
            --text: #d4dae0;
            --text-dim: #7a8290;
            --accent: #4fc3f7;
            --accent-glow: rgba(79, 195, 247, 0.3);
            --green: #66bb6a;
            --red: #ef5350;
            --amber: #ffa726;
            --ant: #ffd54f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1.5rem;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .logo { display: flex; align-items: center; gap: 0.6rem; }
        .logo svg { width: 28px; height: 28px; }
        .logo h1 { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
        .logo .tag { font-size: 0.65rem; color: var(--text-dim); font-weight: 400; }

        .gen-bar { display: flex; gap: 0.3rem; }
        .gen-bar button {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.35rem 0.7rem;
            border-radius: 5px;
            font-size: 0.72rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.15s;
        }
        .gen-bar button:hover { color: var(--accent); border-color: var(--accent); background: rgba(79,195,247,0.08); }
        .gen-bar button.active { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: 600; }

        .header-actions { display: flex; gap: 0.4rem; align-items: center; }
        .header-actions button {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.8rem;
            border-radius: 5px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .header-actions button:hover { border-color: var(--accent); }
        .header-actions button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
        .header-actions button.primary:hover { background: #29b6f6; }

        /* ── Layout ── */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* ── Sidebar ── */
        .sidebar {
            width: 340px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-section { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); }
        .sidebar-section h3 { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 0.5rem; }

        .map-input {
            width: 100%;
            height: 160px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            resize: none;
            line-height: 1.4;
        }
        .map-input:focus { outline: none; border-color: var(--accent); }

        .output-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            height: 140px;
            overflow-y: auto;
            white-space: pre;
            line-height: 1.5;
            color: var(--text-dim);
        }
        .output-box .move-line { color: var(--accent); }

        /* ── Stats ── */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
        .stat {
            background: var(--bg-elevated);
            border-radius: 6px;
            padding: 0.5rem;
            text-align: center;
        }
        .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        .stat-lbl { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.15rem; }

        /* ── Controls ── */
        .controls-row { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
        .controls-row button {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.35rem 0.6rem;
            border-radius: 5px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .controls-row button:hover { border-color: var(--accent); }
        .speed-slider { display: flex; align-items: center; gap: 0.4rem; margin-left: auto; }
        .speed-slider input { width: 80px; accent-color: var(--accent); }
        .speed-slider span { font-size: 0.65rem; color: var(--text-dim); }

        /* ── Visualization area ── */
        .viz-area {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at center, #0d1219 0%, var(--bg) 100%);
            overflow: hidden;
        }
        #viz-svg { width: 100%; height: 100%; cursor: grab; }
        #viz-svg:active { cursor: grabbing; }

        .viz-overlay {
            position: absolute;
            top: 0.8rem;
            left: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            pointer-events: none;
        }
        .turn-badge {
            background: rgba(17, 22, 30, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.8rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .turn-badge .label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }
        .turn-badge .value { font-size: 1.1rem; font-weight: 700; color: var(--accent); }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--border);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--green));
            transition: width 0.3s ease;
            width: 0%;
        }

        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); font-size: 0.8rem; }

        /* ── SVG styles ── */
        .room-circle { transition: r 0.2s ease, fill 0.2s; cursor: pointer; }
        .room-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; fill: var(--text-dim); pointer-events: none; text-anchor: middle; }
        .room-group:hover .room-circle { stroke-width: 3; }
        .link-line { stroke: var(--border); stroke-width: 1.5; fill: none; transition: stroke 0.3s, stroke-width 0.3s; }
        .link-active { stroke: var(--accent); stroke-width: 2.5; }
        .ant-dot { fill: var(--ant); transition: cx 0.4s ease, cy 0.4s ease; filter: drop-shadow(0 0 3px var(--ant)); }
        .ant-label { font-family: 'JetBrains Mono', monospace; font-size: 7px; fill: #1a1500; font-weight: 700; text-anchor: middle; pointer-events: none; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 100 100" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round">
                <circle cx="50" cy="50" r="12" fill="var(--accent)" stroke="none"/>
                <circle cx="20" cy="30" r="8"/>
                <circle cx="80" cy="30" r="8"/>
                <circle cx="20" cy="70" r="8"/>
                <circle cx="80" cy="70" r="8"/>
                <line x1="50" y1="50" x2="20" y2="30"/>
                <line x1="50" y1="50" x2="80" y2="30"/>
                <line x1="50" y1="50" x2="20" y2="70"/>
                <line x1="50" y1="50" x2="80" y2="70"/>
            </svg>
            <div>
                <h1>Lem-in Visualiseur</h1>
                <div class="tag">WebAssembly · École 42</div>
            </div>
        </div>

        <div class="gen-bar">
            <button onclick="genOfficial('flow-one', this)">--flow-one</button>
            <button onclick="genOfficial('flow-ten', this)">--flow-ten</button>
            <button onclick="genOfficial('flow-thousand', this)">--flow-thousand</button>
            <button onclick="genOfficial('big', this)">--big</button>
            <button onclick="genOfficial('big-superposition', this)">--big-superposition</button>
            <span id="genInfo" style="font-size:0.65rem;color:var(--text-dim);margin-left:0.5rem;"></span>
        </div>

        <div class="header-actions">
            <button onclick="runSimulation()" class="primary">▶ Résoudre</button>
        </div>
    </header>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>Carte</h3>
                <textarea class="map-input" id="inputMap" spellcheck="false">4
##start
1 0 0
2 1 0
3 0 1
4 1 1
##end
5 2 0
1-2
1-3
2-4
3-4
4-5</textarea>
            </div>

            <div class="sidebar-section">
                <h3>Sortie</h3>
                <div class="output-box" id="output"></div>
            </div>

            <div class="sidebar-section">
                <h3>Statistiques</h3>
                <div class="stats-grid">
                    <div class="stat"><div class="stat-val" id="turnCount">—</div><div class="stat-lbl">Tours</div></div>
                    <div class="stat"><div class="stat-val" id="antCount">—</div><div class="stat-lbl">Fourmis</div></div>
                    <div class="stat"><div class="stat-val" id="pathCount">—</div><div class="stat-lbl">Chemins</div></div>
                    <div class="stat"><div class="stat-val" id="arrivedCount">0/0</div><div class="stat-lbl">Arrivées</div></div>
                </div>
            </div>

            <div class="sidebar-section" style="flex: 1;">
                <h3>Contrôles</h3>
                <div class="controls-row">
                    <button onclick="togglePause()" id="pauseBtn">⏸ Pause</button>
                    <button onclick="stepBack()">◀ Tour</button>
                    <button onclick="stepForward()">Tour ▶</button>
                    <button onclick="reset()">↺ Reset</button>
                </div>
                <div class="controls-row" style="margin-top: 0.5rem;">
                    <div class="speed-slider">
                        <span>Vitesse</span>
                        <input type="range" id="speedRange" min="50" max="1500" value="500">
                    </div>
                </div>
            </div>
        </div>

        <div class="viz-area">
            <div class="viz-overlay">
                <div class="turn-badge">
                    <div class="label">Tour</div>
                    <div class="value" id="turnDisplay">0 / 0</div>
                </div>
            </div>
            <svg id="viz-svg" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <radialGradient id="grad-start">
                        <stop offset="0%" stop-color="#81c784"/>
                        <stop offset="100%" stop-color="#388e3c"/>
                    </radialGradient>
                    <radialGradient id="grad-end">
                        <stop offset="0%" stop-color="#e57373"/>
                        <stop offset="100%" stop-color="#c62828"/>
                    </radialGradient>
                    <radialGradient id="grad-room">
                        <stop offset="0%" stop-color="#2a3140"/>
                        <stop offset="100%" stop-color="#1a1f2b"/>
                    </radialGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <g id="viewport"></g>
            </svg>
            <div class="loading" id="loadingMsg">Chargement WASM…</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
    </div>

    <script type="module">
        import init, { parse_and_solve } from './lem_in_rust.js';

        let wasmReady = false;
        let isPaused = false;
        let moves = [];
        let currentTurn = 0;
        let totalTurns = 0;
        let totalAnts = 0;
        let rooms = [];
        let links = [];
        let roomMap = {};
        let antPositions = {}; // antId -> roomName
        let animTimer = null;
        let panX = 0, panY = 0, scale = 1;
        let isDragging = false, dragStartX = 0, dragStartY = 0;

        async function loadWasm() {
            try {
                await init();
                wasmReady = true;
                document.getElementById('loadingMsg').style.display = 'none';
            } catch(e) {
                document.getElementById('loadingMsg').textContent = 'Erreur WASM: ' + e;
            }
        }
        loadWasm();

        // ============================================================
        // Maps pré-générées par le vrai générateur officiel 42
        // ============================================================
        // 50 maps générées avec ./generator-official (binaire de l'école)
        // Le générateur utilise srand(time(NULL)) → maps différentes à chaque seconde.
        // On a pré-généré 10 maps par option en espaçant les appels d'1 seconde.
        // À chaque clic, on tire aléatoirement dans le pool → impression de temps réel.

        function mapFiles(opt) {
            return Array.from({length: 10}, (_, i) => `maps/${opt}_${i+1}.txt`);
        }

        const MAP_DESC = {
            'flow-one':           '1 fourmi, chemin distinctif',
            'flow-ten':           '~10 fourmis, chemin distinctif',
            'flow-thousand':      '~100 fourmis, chemin distinctif',
            'big':                '~300 fourmis, ~2000-3500 salles',
            'big-superposition':  '~350 fourmis, ~3000-5600 salles, chemins chevauchés'
        };

        window.genOfficial = async function(opt, btn) {
            if(!MAP_DESC[opt]) return;
            document.querySelectorAll('.gen-bar button').forEach(b=>b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            // Tirer aléatoirement dans le pool de 10 maps
            const files = mapFiles(opt);
            const file = files[Math.floor(Math.random() * files.length)];
            const genInfo = document.getElementById('genInfo');

            try {
                const resp = await fetch(file);
                if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const mapText = await resp.text();
                document.getElementById('inputMap').value = mapText;

                // Stats
                const lines = mapText.split('\n');
                const ants = lines[0];
                const rooms = lines.filter(l => l.match(/^\S+ -?\d+ -?\d+$/)).length;
                const links = lines.filter(l => l.includes('-') && !l.startsWith('#') && !l.match(/^\S+ -?\d+ -?\d+$/)).length;
                const num = file.match(/_(\d+)\./)[1];
                if(genInfo) genInfo.textContent = `${ants} fourmis · ${rooms} salles · ${links} liens · map #${num}/10`;
            } catch(e) {
                if(genInfo) genInfo.textContent = `❌ ${e}`;
            }
        };

        // ============================================================
        // Résolution + visualisation SVG
        // ============================================================
        window.runSimulation = async function() {
            if(!wasmReady){ alert('WASM en cours de chargement…'); return; }
            const input = document.getElementById('inputMap').value;
            const out = document.getElementById('output');
            out.innerHTML = '';

            try {
                const result = parse_and_solve(input);
                const lines = result.split('\n');
                let inMoves = false;
                moves = []; rooms = []; links = []; roomMap = {};

                for(const line of lines) {
                    if(line.trim()==='') continue;
                    if(line.startsWith('L')) {
                        inMoves = true;
                        moves.push(line);
                        const div = document.createElement('div');
                        div.className = 'move-line';
                        div.textContent = line;
                        out.appendChild(div);
                    } else if(!inMoves) {
                        if(line==='##start'||line==='##end') continue;
                        const rm = line.match(/^(\S+)\s+(-?\d+)\s+(-?\d+)$/);
                        if(rm) {
                            rooms.push({name:rm[1],x:parseInt(rm[2]),y:parseInt(rm[3])});
                            roomMap[rm[1]] = rooms[rooms.length-1];
                        } else if(line.includes('-')&&!line.startsWith('#')) {
                            const p=line.split('-'); if(p.length===2) links.push([p[0],p[1]]);
                        }
                    }
                }

                // Détecter start/end
                const il = input.split('\n');
                let ns=false, ne=false;
                for(const line of il) {
                    if(line.trim()==='##start'){ns=true;continue;}
                    if(line.trim()==='##end'){ne=true;continue;}
                    const m=line.match(/^(\S+)\s+(-?\d+)\s+(-?\d+)$/);
                    if(m){const r=roomMap[m[1]]; if(r){if(ns){r.isStart=true;ns=false;} if(ne){r.isEnd=true;ne=false;}}}
                }
                totalAnts = parseInt(il[0]) || 0;
                totalTurns = moves.length;
                currentTurn = 0;
                antPositions = {};

                document.getElementById('antCount').textContent = totalAnts;
                document.getElementById('turnCount').textContent = totalTurns;

                // Compter chemins au tour 0
                if(moves.length>0) {
                    const firstRooms = new Set();
                    for(const tok of moves[0].trim().split(/\s+/)) {
                        const m = tok.match(/L\d+-(\S+)/);
                        if(m) firstRooms.add(m[1]);
                    }
                    document.getElementById('pathCount').textContent = firstRooms.size;
                }

                out.scrollTop = out.scrollHeight;
                renderGraph();
                updateTurn(0);
                startAnimation();
            } catch(e) {
                out.innerHTML = `<span style="color:var(--red)">Erreur: ${e}</span>`;
            }
        };

        // ============================================================
        // Rendu SVG du graphe
        // ============================================================
        function renderGraph() {
            const vp = document.getElementById('viewport');
            vp.innerHTML = '';

            if(rooms.length === 0) return;

            // Auto-layout : si peu de salles, utiliser coordonnées originales
            // Si beaucoup, layout circulaire
            const useOriginal = rooms.length <= 200;

            if(useOriginal) {
                const minX = Math.min(...rooms.map(r=>r.x));
                const maxX = Math.max(...rooms.map(r=>r.x));
                const minY = Math.min(...rooms.map(r=>r.y));
                const maxY = Math.max(...rooms.map(r=>r.y));
                const rangeX = maxX - minX || 1;
                const rangeY = maxY - minY || 1;
                const padding = 60;
                const svgW = document.getElementById('viz-svg').clientWidth;
                const svgH = document.getElementById('viz-svg').clientHeight;
                const s = Math.min((svgW - 2*padding)/rangeX, (svgH - 2*padding)/rangeY);
                const ox = (svgW - rangeX*s)/2;
                const oy = (svgH - rangeY*s)/2;
                rooms.forEach(r => { r.sx = ox + (r.x-minX)*s; r.sy = oy + (r.y-minY)*s; });
            } else {
                // Layout circulaire : start au centre, end en haut, autres en cercles
                const svgW = document.getElementById('viz-svg').clientWidth;
                const svgH = document.getElementById('viz-svg').clientHeight;
                const cx = svgW/2, cy = svgH/2;
                const start = rooms.find(r=>r.isStart);
                const end = rooms.find(r=>r.isEnd);
                if(start) { start.sx = cx; start.sy = cy; }
                if(end) { end.sx = cx; end.sy = cy - Math.min(svgH,svgW)*0.35; }
                const others = rooms.filter(r=>!r.isStart&&!r.isEnd);
                const radius = Math.min(svgW,svgW)*0.3;
                others.forEach((r,i) => {
                    const angle = (i/others.length)*Math.PI*2;
                    const r2 = radius * (0.4 + 0.6*Math.random());
                    r.sx = cx + Math.cos(angle)*r2;
                    r.sy = cy + Math.sin(angle)*r2;
                });
            }

            // Links
            const linkGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
            linkGroup.setAttribute('id','links');
            for(const [a,b] of links) {
                const r1 = roomMap[a], r2 = roomMap[b];
                if(r1 && r2 && r1.sx !== undefined) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
                    line.setAttribute('x1',r1.sx); line.setAttribute('y1',r1.sy);
                    line.setAttribute('x2',r2.sx); line.setAttribute('y2',r2.sy);
                    line.setAttribute('class','link-line');
                    line.setAttribute('id',`link-${a}-${b}`);
                    linkGroup.appendChild(line);
                }
            }
            vp.appendChild(linkGroup);

            // Rooms
            const roomGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
            roomGroup.setAttribute('id','rooms');
            const showLabels = rooms.length <= 80;
            const radius = rooms.length <= 50 ? 14 : rooms.length <= 200 ? 8 : 4;

            for(const r of rooms) {
                if(r.sx === undefined) continue;
                const g = document.createElementNS('http://www.w3.org/2000/svg','g');
                g.setAttribute('class','room-group');
                g.setAttribute('transform',`translate(${r.sx},${r.sy})`);

                const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
                c.setAttribute('r',radius);
                c.setAttribute('class','room-circle');
                if(r.isStart) { c.setAttribute('fill','url(#grad-start)'); c.setAttribute('stroke','#81c784'); c.setAttribute('stroke-width','2.5'); c.setAttribute('filter','url(#glow)'); }
                else if(r.isEnd) { c.setAttribute('fill','url(#grad-end)'); c.setAttribute('stroke','#e57373'); c.setAttribute('stroke-width','2.5'); c.setAttribute('filter','url(#glow)'); }
                else { c.setAttribute('fill','url(#grad-room)'); c.setAttribute('stroke','#4fc3f7'); c.setAttribute('stroke-width','1.5'); }
                c.setAttribute('id',`room-${r.name}`);
                g.appendChild(c);

                if(showLabels) {
                    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
                    t.setAttribute('class','room-label');
                    t.setAttribute('y', radius + 10);
                    t.textContent = r.name;
                    g.appendChild(t);
                }
                roomGroup.appendChild(g);
            }
            vp.appendChild(roomGroup);

            // Ants layer (sera mis à jour par updateTurn)
            const antLayer = document.createElementNS('http://www.w3.org/2000/svg','g');
            antLayer.setAttribute('id','ants');
            vp.appendChild(antLayer);

            // Pan & zoom
            setupPanZoom();
        }

        function setupPanZoom() {
            const svg = document.getElementById('viz-svg');
            svg.onmousedown = (e) => {
                if(e.target.tagName === 'circle' || e.target.tagName === 'text') return;
                isDragging = true; dragStartX = e.clientX - panX; dragStartY = e.clientY - panY;
            };
            svg.onmousemove = (e) => {
                if(!isDragging) return;
                panX = e.clientX - dragStartX; panY = e.clientY - dragStartY;
                updateViewport();
            };
            svg.onmouseup = () => isDragging = false;
            svg.onmouseleave = () => isDragging = false;
            svg.onwheel = (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                scale = Math.max(0.2, Math.min(5, scale * delta));
                updateViewport();
            };
            panX = 0; panY = 0; scale = 1;
            updateViewport();
        }

        function updateViewport() {
            const vp = document.getElementById('viewport');
            vp.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
        }

        // ============================================================
        // Animation tour par tour
        // ============================================================
        function updateTurn(turn) {
            currentTurn = turn;
            // Recalculer les positions des fourmis jusqu'au tour actuel
            antPositions = {};
            for(let t = 0; t <= turn && t < moves.length; t++) {
                for(const tok of moves[t].trim().split(/\s+/)) {
                    const m = tok.match(/L(\d+)-(\S+)/);
                    if(m) antPositions[m[1]] = m[2];
                }
            }

            // Mettre à jour les fourmis sur le SVG
            const antLayer = document.getElementById('ants');
            if(!antLayer) return;
            antLayer.innerHTML = '';

            const radius = rooms.length <= 50 ? 14 : rooms.length <= 200 ? 8 : 4;
            const antR = Math.max(3, radius * 0.45);

            for(const [antId, roomName] of Object.entries(antPositions)) {
                const r = roomMap[roomName];
                if(!r || r.sx === undefined) continue;

                const g = document.createElementNS('http://www.w3.org/2000/svg','g');
                g.setAttribute('transform',`translate(${r.sx},${r.sy})`);

                const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
                c.setAttribute('r', antR);
                c.setAttribute('class','ant-dot');
                g.appendChild(c);

                if(rooms.length <= 80) {
                    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
                    t.setAttribute('class','ant-label');
                    t.setAttribute('y', 2);
                    t.textContent = antId;
                    g.appendChild(t);
                }
                antLayer.appendChild(g);
            }

            // Stats
            const endRoom = rooms.find(r => r.isEnd);
            const arrived = endRoom ? (Object.values(antPositions).filter(n => n === endRoom.name).length) : 0;
            document.getElementById('turnDisplay').textContent = `${turn + 1} / ${totalTurns}`;
            document.getElementById('arrivedCount').textContent = `${arrived}/${totalAnts}`;
            document.getElementById('progressFill').style.width = `${totalTurns > 0 ? ((turn+1)/totalTurns)*100 : 0}%`;

            // Scroll output to current turn
            const out = document.getElementById('output');
            const lines = out.children;
            if(lines[turn]) {
                Array.from(lines).forEach(l => l.style.opacity = '0.4');
                lines[turn].style.opacity = '1';
                lines[turn].scrollIntoView({block:'nearest', behavior:'smooth'});
            }
        }

        function startAnimation() {
            if(animTimer) clearTimeout(animTimer);
            isPaused = false;
            document.getElementById('pauseBtn').textContent = '⏸ Pause';
            animStep();
        }

        function animStep() {
            if(isPaused) return;
            if(currentTurn >= totalTurns - 1) return;
            updateTurn(currentTurn + 1);
            const speed = 1600 - parseInt(document.getElementById('speedRange').value);
            animTimer = setTimeout(animStep, speed);
        }

        window.togglePause = function() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '▶ Play' : '⏸ Pause';
            if(!isPaused) animStep();
        };

        window.stepForward = function() {
            if(currentTurn < totalTurns - 1) { updateTurn(currentTurn + 1); }
        };

        window.stepBack = function() {
            if(currentTurn > 0) { updateTurn(currentTurn - 1); }
        };

        window.reset = function() {
            if(animTimer) clearTimeout(animTimer);
            isPaused = false;
            currentTurn = 0;
            antPositions = {};
            document.getElementById('pauseBtn').textContent = '⏸ Pause';
            document.getElementById('output').innerHTML = '';
            document.getElementById('turnDisplay').textContent = '0 / 0';
            document.getElementById('arrivedCount').textContent = '0/0';
            document.getElementById('progressFill').style.width = '0%';
            const antLayer = document.getElementById('ants');
            if(antLayer) antLayer.innerHTML = '';
        };
    </script>
</body>
</html>
